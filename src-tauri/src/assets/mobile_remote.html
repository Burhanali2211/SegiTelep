<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SegiRemote | Pro Controller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #121214;
            --surface: #121214;
            --accent: #3b82f6;
            --text: #e1e1e6;
            --text-dim: #a1a1aa;

            /* Dark Neumorphism Tokens */
            --nm-shadow-out: 8px 8px 16px #0a0a0b, -8px -8px 16px #1a1a1d;
            --nm-shadow-in: inset 4px 4px 8px #0a0a0b, inset -4px -4px 8px #1a1a1d;
            --nm-shadow-sm: 4px 4px 8px #0a0a0b, -4px -4px 8px #1a1a1d;

            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            position: fixed;
            inset: 0;
        }

        /* Utility classes */
        .nm-flat {
            background: var(--surface);
            box-shadow: var(--nm-shadow-out);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .nm-inset {
            background: var(--surface);
            box-shadow: var(--nm-shadow-in);
        }

        .nm-concave {
            background: linear-gradient(145deg, #101012, #141416);
            box-shadow: var(--nm-shadow-out);
        }

        /* Container */
        .app-container {
            padding: calc(15px + var(--safe-top)) 20px calc(15px + var(--safe-bottom));
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
        }

        /* Landscape Layout */
        @media (orientation: landscape) {
            .app-container {
                display: grid;
                grid-template-columns: 240px 1fr 200px;
                grid-template-rows: auto 1fr;
                gap: 16px;
                max-width: none;
                padding: 15px 30px;
            }

            .header {
                grid-column: 1 / -1;
                margin-bottom: 0 !important;
            }

            .info-card {
                grid-column: 1;
                grid-row: 2;
                margin-bottom: 0 !important;
                align-self: start;
            }

            .controls-area {
                grid-column: 2;
                grid-row: 2;
                align-self: center;
            }

            .upload-section {
                grid-column: 3;
                grid-row: 2;
                align-self: start;
                margin-top: 0 !important;
            }

            .action-container {
                grid-template-columns: 1fr;
            }

            .btn-action {
                height: 45px;
            }

            .project-title {
                font-size: 1.1rem;
            }

            .transport-controls {
                gap: 15px;
            }

            .btn-play-pause {
                width: 75px;
                height: 75px;
            }

            .btn-transport {
                width: 55px;
                height: 55px;
            }
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot-container {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
            transition: all 0.5s ease;
        }

        .status-dot.active {
            background: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Info Card */
        .info-card {
            padding: 20px;
            border-radius: 24px;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-item {
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2px;
            display: block;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Controls Area */
        .controls-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
        }

        .transport-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .btn-transport {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-transport:active {
            box-shadow: var(--nm-shadow-in);
            transform: scale(0.95);
        }

        .btn-play-pause {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-play-pause.playing {
            color: var(--accent);
            box-shadow: var(--nm-shadow-in);
        }

        .btn-play-pause svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
        }

        .action-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-action {
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action.active {
            color: var(--accent);
            box-shadow: var(--nm-shadow-in);
        }

        .glow-red {
            color: #ef4444;
        }

        .glow-blue {
            color: #3b82f6;
        }

        /* Upload Section */
        .upload-section {
            padding: 18px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto;
            cursor: pointer;
        }

        .upload-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .upload-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
        }

        .upload-title {
            font-size: 0.85rem;
            font-weight: 700;
            display: block;
            text-transform: uppercase;
        }

        .upload-status {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        /* Icons */
        svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="brand">SegiRemote <span style="font-weight:300; opacity:0.5">v2.0</span></div>
            <div class="status-dot-container nm-inset">
                <div id="statusDot" class="status-dot"></div>
            </div>
        </header>

        <section class="info-card nm-concave">
            <span id="projectName" class="project-title">Ready for Sync</span>
            <div class="stats-grid">
                <div class="stat-item nm-inset">
                    <span class="stat-label">Segment</span>
                    <span id="segmentProgress" class="stat-value">-- / --</span>
                </div>
                <div class="stat-item nm-inset">
                    <span class="stat-label">Latency</span>
                    <span id="syncQuality" class="stat-value">- ms</span>
                </div>
            </div>
        </section>

        <main class="controls-area">
            <div class="transport-controls">
                <div class="btn-transport nm-flat" onclick="sendCommand('prev_segment')">
                    <svg viewBox="0 0 24 24">
                        <path d="m11 17-5-5 5-5M18 17l-5-5 5-5"></path>
                    </svg>
                </div>
                <div id="playBtn" class="btn-play-pause nm-flat" onclick="togglePlay()">
                    <svg id="playIcon" viewBox="0 0 24 24" style="fill:currentColor">
                        <path d="m7 3 14 9-14 9z"></path>
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
                        <path d="M6 4h4v16H6zM14 4h4v16h-4z" style="fill:currentColor"></path>
                    </svg>
                </div>
                <div class="btn-transport nm-flat" onclick="sendCommand('next_segment')">
                    <svg viewBox="0 0 24 24">
                        <path d="m13 17 5-5-5-5M6 17l5-5-5-5"></path>
                    </svg>
                </div>
            </div>
            <div class="action-container">
                <div class="btn-action nm-flat" onclick="sendCommand('stop')">
                    <svg viewBox="0 0 24 24">
                        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                    </svg><span>Stop</span>
                </div>
                <div class="btn-action nm-flat" onclick="sendCommand('reset_position')">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"></path>
                    </svg><span>Reset</span>
                </div>
                <div id="liveToggle" class="btn-action nm-flat glow-red" onclick="toggleLive()">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg><span id="liveText">Go Live</span>
                </div>
                <div class="btn-action nm-flat glow-blue" onclick="sendCommand('toggle_mirror')">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M7 21a4 4 0 0 1-4-4V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v12a4 4 0 0 1-4 4Zm0 0h10a4 4 0 0 0 4-4V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v12a4 4 0 0 0 4 4Z">
                        </path>
                    </svg><span>Mirror</span>
                </div>
            </div>
        </main>

        <section class="upload-section nm-inset" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" style="display: none;" onchange="handleFileUpload(this)">
            <div class="upload-header">
                <div class="upload-icon nm-flat"><svg viewBox="0 0 24 24">
                        <path d="M12 3v12M7 8l5-5 5 5M5 21h14"></path>
                    </svg></div>
                <div class="upload-text"><span class="upload-title">Share File</span><span id="uploadStatus"
                        class="upload-status">Ready for P2P Transfer</span></div>
            </div>
        </section>
    </div>

    <script>
        let ws = null;
        let currentStatus = { is_playing: false, is_live: false };
        function connect() {
            const wsPort = parseInt(window.location.port) + 1;
            const wsUrl = `ws://${window.location.hostname}:${wsPort}`;
            try {
                ws = new WebSocket(wsUrl);
                ws.onopen = () => { document.getElementById('statusDot').classList.add('active'); document.getElementById('syncQuality').innerText = '< 5ms'; };
                ws.onmessage = (e) => { try { const s = JSON.parse(e.data); handleStatusUpdate(s); } catch (e) { } };
                ws.onclose = () => { document.getElementById('statusDot').classList.remove('active'); document.getElementById('syncQuality').innerText = 'Lost'; setTimeout(connect, 3000); };
            } catch (e) { setTimeout(connect, 3000); }
        }
        function handleStatusUpdate(s) {
            currentStatus = s;
            document.getElementById('projectName').innerText = s.project_name || 'Standby';
            document.getElementById('segmentProgress').innerText = `${(s.current_segment || 0) + 1} / ${s.total_segments || 1}`;
            const play = document.getElementById('playIcon'), pause = document.getElementById('pauseIcon'), btn = document.getElementById('playBtn');
            if (s.is_playing) { play.style.display = 'none'; pause.style.display = 'block'; btn.classList.add('playing'); }
            else { play.style.display = 'block'; pause.style.display = 'none'; btn.classList.remove('playing'); }
            const live = document.getElementById('liveToggle'), text = document.getElementById('liveText');
            if (s.is_live) { live.classList.add('active'); text.innerText = 'Exit Live'; }
            else { live.classList.remove('active'); text.innerText = 'Go Live'; }
        }
        function sendCommand(t, v = null) { if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ type: t, value: v, timestamp: Date.now() })); if (navigator.vibrate) navigator.vibrate(15); } }
        function togglePlay() { sendCommand(currentStatus.is_playing ? 'pause' : 'play'); }
        function toggleLive() { sendCommand(currentStatus.is_live ? 'exit_live' : 'go_live'); }
        async function handleFileUpload(input) {
            const file = input.files[0]; if (!file) return;
            const status = document.getElementById('uploadStatus');
            try {
                status.innerText = 'Syncing...';
                const formData = new FormData(); formData.append('file', file);
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.success) {
                    status.innerText = 'Complete'; status.style.color = '#22c55e'; if (navigator.vibrate) navigator.vibrate([10, 40, 10]);
                    setTimeout(() => { status.innerText = 'Ready for P2P Transfer'; status.style.color = ''; }, 3000);
                } else { throw new Error(); }
            } catch (e) { status.innerText = 'Failed'; status.style.color = '#ef4444'; }
            finally { input.value = ''; }
        }
        window.onload = connect;
    </script>
</body>

</html>
